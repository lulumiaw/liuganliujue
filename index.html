<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>六感六覺作文練習</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        :root{--cream:#FFF8F0;--pink:#FFD6D6;--yellow:#FFF3C4;--green:#D4EDDA;--text-dark:#3D2B1F;--text-mid:#6B4C3B;--text-soft:#9B7C6E;--btn:#F4845F;}
        body{font-family:'PingFang TC','Heiti TC',sans-serif;background:var(--cream);color:var(--text-dark);padding:15px}
        #app{max-width:600px;margin:0 auto}
        .card{background:#fff;border-radius:20px;padding:20px;text-align:center;border:2px solid var(--pink);margin-bottom:15px;position:relative}
        .subj-emoji{font-size:60px;display:block}
        .subj-name{font-size:24px;font-weight:bold}
        .sense-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:15px 0}
        .sense-btn{padding:10px;border-radius:12px;border:none;cursor:pointer;background:#eee;font-weight:bold}
        .sense-btn.sel{background:var(--btn);color:#fff}
        .slots{background:#fff;border-radius:15px;padding:15px;border:2px solid var(--green);margin-bottom:15px}
        .slot-row{margin-bottom:8px;font-size:15px}
        .chip-area{background:#fff;border:1.5px dashed #FFB74D;border-radius:15px;padding:12px;margin-bottom:15px}
        .chip{display:inline-block;padding:8px 12px;background:var(--yellow);border-radius:10px;margin:4px;cursor:pointer;font-size:14px}
        .preview{background:#fff;border-radius:15px;padding:15px;border:2px solid #BBDEFB;min-height:60px;font-size:18px;line-height:1.6}
        .sub-btn{width:100%;padding:15px;border-radius:15px;border:none;background:#4CAF50;color:#fff;font-size:18px;font-weight:bold;margin-top:15px;cursor:pointer}
        .sub-btn:disabled{background:#ccc}
        .next-btn{position:absolute;top:10px;right:10px;padding:5px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:12px}
    </style>
</head>
<body>

<div id="app">
    <div style="text-align:center;margin-bottom:10px"><h1>🌟 六感作文練習 🌟</h1></div>
    
    <div class="card">
        <button class="next-btn" onclick="nextSubject()">換一題 ↻</button>
        <span class="subj-emoji" id="e">🌹</span>
        <div class="subj-name" id="n">玫瑰花</div>
        <div id="z" style="color:#999;font-size:14px">ㄇㄟˊ ㄍㄨㄟ ㄏㄨㄚ</div>
    </div>

    <div style="font-weight:bold;margin-bottom:5px">1. 選兩項感官 + 心覺：</div>
    <div class="sense-grid" id="btns"></div>
    <div id="hbtn-area" style="margin-bottom:15px">
        <button class="sense-btn" id="hb" style="width:100%" onclick="toggleHeart()">💖 心覺 (必選)</button>
    </div>

    <div class="slots" id="slot-panel" style="display:none">
        <div style="font-weight:bold;margin-bottom:10px">2. 點選下方詞語填入：</div>
        <div id="slot-list"></div>
    </div>

    <div class="chip-area">
        <div id="hlabel" style="font-size:12px;color:#666;margin-bottom:5px">請先點選感官...</div>
        <div id="chips"></div>
    </div>

    <div class="preview" id="pv">句子預覽會在這裡出現...</div>
    <button class="sub-btn" id="sb" onclick="alert('太棒了！你完成了一句：\n' + document.getElementById('pv').innerText)" disabled>完成練習 ✓</button>
</div>

<script>
const SENSES = {
    1:{n:"視覺",i:"👁️"}, 2:{n:"聽覺",i:"👂"}, 3:{n:"嗅覺",i:"👃"}, 
    4:{n:"味覺",i:"👅"}, 5:{n:"觸覺",i:"✋"}, 6:{n:"心覺",i:"💖"}
};
const SUBJECTS = [
    {n:"玫瑰花",z:"ㄇㄟˊ ㄍㄨㄟ ㄏㄨㄚ",e:"🌹",d:{1:[{w:"紅紅的"}],3:[{w:"香噴噴的"}],5:[{w:"刺刺的"}]}},
    {n:"草莓",z:"ㄘㄠˇ ㄇㄟˊ",e:"🍓",d:{1:[{w:"亮紅色的"}],4:[{w:"酸酸甜甜的"}],3:[{w:"有果香的"}]}},
    {n:"月亮",z:"ㄩㄝˋ ㄌㄧㄤˋ",e:"🌙",d:{1:[{w:"彎彎的"},{w:"金黃色的"}],2:[{w:"安安靜靜的"}]}},
    {n:"鯨魚",z:"ㄐㄧㄥ ㄩˊ",e:"🐋",d:{1:[{w:"巨大的"}],5:[{w:"光滑的"}],2:[{w:"發出嗚嗚聲的"}]}}
];
const CH6 = [{w:"讓我覺得很開心"},{w:"我好喜歡它"},{w:"我覺得好神奇"}];

let CS=null, sel=[], heartOn=false, slots={};

function init(){
    const g = document.getElementById('btns');
    g.innerHTML = '';
    [1,2,3,4,5].forEach(id => {
        const b = document.createElement('button');
        b.className = 'sense-btn';
        b.innerHTML = SENSES[id].i + '<br>' + SENSES[id].n;
        b.onclick = () => {
            if(sel.includes(id)) sel = sel.filter(x=>x!==id);
            else if(sel.length < 2) sel.push(id);
            update();
        };
        b.id = 'b' + id;
        g.appendChild(b);
    });
    nextSubject();
}

function nextSubject(){
    CS = SUBJECTS[Math.floor(Math.random()*SUBJECTS.length)];
    document.getElementById('e').innerText = CS.e;
    document.getElementById('n').innerText = CS.n;
    document.getElementById('z').innerText = CS.z;
    sel = []; heartOn = false; slots = {};
    update();
}

function toggleHeart(){ heartOn = !heartOn; update(); }

function update(){
    [1,2,3,4,5].forEach(id => {
        document.getElementById('b'+id).className = 'sense-btn' + (sel.includes(id)?' sel':'');
    });
    document.getElementById('hb').className = 'sense-btn' + (heartOn?' sel':'');

    const sp = document.getElementById('slot-panel');
    const sl = document.getElementById('slot-list');
    if(sel.length === 2 && heartOn){
        sp.style.display = 'block';
        sl.innerHTML = '';
        [...sel, 6].forEach(id => {
            sl.innerHTML += `<div class="slot-row"><b>${SENSES[id].n}：</b> ${slots[id] || '<span style="color:#ccc">點選詞語...</span>'}</div>`;
        });
    } else {
        sp.style.display = 'none';
    }
    renderChips();
    renderPreview();
}

function renderChips(){
    const c = document.getElementById('chips');
    const h = document.getElementById('hlabel');
    c.innerHTML = '';
    if(sel.length < 2){ h.innerText = '💡 請先選兩項感官按鈕'; return; }
    if(!heartOn){ h.innerText = '💡 還要點選心覺按鈕喔'; return; }

    let activeId = null;
    for(let id of [...sel, 6]){ if(!slots[id]){ activeId = id; break; } }

    if(!activeId){ h.innerText = '✅ 填好了！'; return; }
    h.innerText = '💡 請選擇「' + SENSES[activeId].n + '」語詞：';
    const list = activeId === 6 ? CH6 : (CS.d[activeId] || []);
    list.forEach(item => {
        const d = document.createElement('div');
        d.className = 'chip';
        d.innerText = item.w;
        d.onclick = () => { slots[activeId] = item.w; update(); };
        c.appendChild(d);
    });
}

function renderPreview(){
    const p = document.getElementById('pv');
    const btn = document.getElementById('sb');
    if(sel.length===2 && heartOn && slots[sel[0]] && slots[sel[1]] && slots[6]){
        p.innerText = `${slots[sel[0]]}${CS.n}，${slots[sel[1]]}，${slots[6]}。`;
        btn.disabled = false;
    } else {
        p.innerHTML = '<span style="color:#ccc">選好感官並填入詞語後，句子會出現在這裡...</span>';
        btn.disabled = true;
    }
}

init();
</script>

</body>
</html>
